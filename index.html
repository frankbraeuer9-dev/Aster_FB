<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroids Arcade</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-layout">
      <h1>Asteroids Arcade</h1>
      <p class="subtitle">Pfeiltasten zum Steuern · Leertaste zum Schießen</p>
      <button id="pauseButton" type="button" class="pause-button" aria-pressed="false">
        Pause
      </button>
      <canvas id="gameCanvas" width="900" height="600" aria-label="Asteroids Spielbereich"></canvas>
      <p class="hint">Drücke <strong>R</strong> bei Game Over für Neustart.</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
